<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d"><title id="t">How value compounds</title><desc id="d">A chart comparing value created together against value created apart.</desc><rect width="1200" height="720" fill="#0a100e"/><g font-family="Arial, sans-serif"><text x="65" y="70" fill="#42fcd1" font-size="18" font-weight="800" letter-spacing="4">COMPOUNDING VALUE OVER TIME</text><text x="65" y="120" fill="#f5f1e8" font-size="42" font-weight="900">SMALL CONNECTIONS. ONE BIGGER CURVE.</text><g transform="translate(120 180)"><path d="M0 430H930M0 430V0" stroke="#f5f1e8" stroke-opacity=".55" stroke-width="3"/><g stroke="#f5f1e8" stroke-opacity=".08"><path d="M0 330H930M0 230H930M0 130H930M185 0v430M370 0v430M555 0v430M740 0v430"/></g><path d="M0 418C190 405 350 382 510 330S760 205 930 45" fill="none" stroke="#42fcd1" stroke-width="10"/><path d="M0 418C230 405 430 385 610 350S790 318 930 285" fill="none" stroke="#fc5042" stroke-width="7" stroke-dasharray="15 12"/><text x="750" y="110" fill="#42fcd1" font-size="27" font-weight="800">TOGETHER</text><text x="755" y="315" fill="#fc5042" font-size="27" font-weight="800">APART</text><text x="465" y="488" fill="#f5f1e8" opacity=".7" font-size="20" letter-spacing="5">TIME</text><text transform="rotate(-90)" x="-260" y="-54" fill="#f5f1e8" opacity=".7" font-size="20" letter-spacing="5">VALUE</text></g></g></svg>