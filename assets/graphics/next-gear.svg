<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="t d"><title id="t">What the next gear must add</title><desc id="d">An empty expansion slot connected to TKO asks what new audience, calendar, geography, sponsor category, format, or capability should be added.</desc><rect width="1400" height="760" fill="#0b0f0e"/><g font-family="Arial, sans-serif"><text x="65" y="75" fill="#42fcd1" font-size="18" font-weight="800" letter-spacing="4">THE HANDOFF TO WHAT COMES NEXT</text><text x="65" y="130" fill="#f5f1e8" font-size="45" font-weight="900">THE NEXT PROPERTY SHOULD ADD</text><text x="65" y="180" fill="#fc5042" font-size="45" font-weight="900">A NEW REASON FOR THE MACHINE TO EXIST.</text><g transform="translate(110 245)" font-weight="800"><circle cx="340" cy="230" r="150" fill="#151b19" stroke="#42fcd1" stroke-width="6"/><text x="340" y="220" text-anchor="middle" fill="#f5f1e8" font-size="90">TKO</text><text x="340" y="263" text-anchor="middle" fill="#42fcd1" font-size="16" letter-spacing="4">EXISTING SYSTEM</text><g fill="#f5f1e8" font-size="18"><text x="0" y="45">WEEKLY STORYTELLING</text><text x="0" y="95">COMBAT SPORTS</text><text x="0" y="145">WESTERN SPORTS</text><text x="0" y="365">RIGHTS SALES</text><text x="0" y="415">HOSPITALITY</text><text x="0" y="465">DESTINATION EVENTS</text></g><path d="M490 230H665" stroke="#fc5042" stroke-width="7"/><path d="m635 205 30 25-30 25" fill="none" stroke="#fc5042" stroke-width="7"/><g transform="translate(690 35)"><circle cx="230" cy="195" r="190" fill="#131716" stroke="#fc5042" stroke-width="7" stroke-dasharray="16 12"/><text x="230" y="115" text-anchor="middle" fill="#fc5042" font-size="24" font-weight="900">EMPTY EXPANSION SLOT</text><g fill="#f5f1e8" font-size="18" text-anchor="middle"><text x="230" y="170">NEW AUDIENCE?</text><text x="230" y="212">NEW CALENDAR?</text><text x="230" y="254">NEW GEOGRAPHY?</text><text x="230" y="296">NEW SPONSOR CATEGORY?</text><text x="230" y="338">NEW LIVE-EVENT FORMAT?</text></g></g></g></g></svg>