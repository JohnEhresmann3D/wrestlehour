<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" role="img" aria-labelledby="t d"><title id="t">Fewer events, more revenue</title><desc id="d">A comparison of 47 events in Q1 2025 and 36 events with 17 percent revenue growth in Q1 2026.</desc><rect width="1400" height="700" fill="#0d1210"/><g font-family="Arial, sans-serif"><text x="70" y="80" fill="#42fcd1" font-size="18" font-weight="800" letter-spacing="4">ONE CLEAN OPERATING SIGNAL</text><text x="70" y="135" fill="#f5f1e8" font-size="52" font-weight="900">FEWER EVENTS. MORE REVENUE.</text><g transform="translate(100 220)"><rect width="430" height="330" rx="14" fill="#151a18" stroke="#5f7d76"/><text x="50" y="60" fill="#f5f1e8" opacity=".68" font-size="18" font-weight="800">Q1 2025</text><text x="215" y="190" text-anchor="middle" fill="#f5f1e8" font-size="120" font-weight="900">47</text><text x="215" y="245" text-anchor="middle" fill="#f5f1e8" font-size="24" font-weight="800">EVENTS</text><text x="215" y="292" text-anchor="middle" fill="#f5f1e8" opacity=".6" font-size="18">REVENUE BASELINE</text></g><g transform="translate(870 220)"><rect width="430" height="330" rx="14" fill="#151a18" stroke="#42fcd1"/><text x="50" y="60" fill="#42fcd1" font-size="18" font-weight="800">Q1 2026</text><text x="215" y="175" text-anchor="middle" fill="#f5f1e8" font-size="100" font-weight="900">36</text><text x="215" y="225" text-anchor="middle" fill="#f5f1e8" font-size="22" font-weight="800">EVENTS</text><text x="215" y="286" text-anchor="middle" fill="#42fcd1" font-size="47" font-weight="900">+17%</text><text x="215" y="318" text-anchor="middle" fill="#f5f1e8" opacity=".65" font-size="16">REVENUE</text></g><path d="M565 385H835" stroke="#fc5042" stroke-width="8"/><path d="m810 360 30 25-30 25" fill="none" stroke="#fc5042" stroke-width="8"/><text x="700" y="340" text-anchor="middle" fill="#fc5042" font-size="25" font-weight="900">BETTER MONETIZATION?</text><text x="700" y="595" text-anchor="middle" fill="#fc9142" font-size="18" font-weight="800">ONE QUARTER IS EVIDENCE. IT IS NOT A TREND LINE.</text></g></svg>