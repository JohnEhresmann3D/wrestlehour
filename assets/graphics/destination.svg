<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 930" role="img" aria-labelledby="t d"><title id="t">From three events to a destination product</title><desc id="d">PBR, UFC, and WWE events combine into a TKO Takeover city package serving fans, sponsors, hotels, venues, and tourism.</desc><rect width="1600" height="930" fill="#0b0e0d"/><g font-family="Arial, sans-serif"><text x="60" y="72" fill="#f5f1e8" font-size="44" font-weight="900">BEFORE: THREE EVENTS.</text><text x="875" y="72" fill="#fc5042" font-size="44" font-weight="900">AFTER: A DESTINATION PRODUCT.</text><text x="875" y="112" fill="#f5f1e8" opacity=".72" font-size="19">The customer is no longer only the fan. The city becomes a customer too.</text><g transform="translate(60 160)" font-weight="800" text-anchor="middle"><g><rect width="220" height="190" rx="9" fill="#34271e" stroke="#7d6c5f"/><text x="110" y="88" fill="#fc9142" font-size="44">PBR</text><text x="110" y="135" fill="#f5f1e8" font-size="18">EVENT</text></g><g transform="translate(250)"><rect width="220" height="190" rx="9" fill="#15181b" stroke="#5f7d76"/><text x="110" y="88" fill="#fc5042" font-size="44">UFC</text><text x="110" y="135" fill="#f5f1e8" font-size="18">EVENT</text></g><g transform="translate(500)"><rect width="220" height="190" rx="9" fill="#20161d" stroke="#5f7d76"/><text x="110" y="88" fill="#42fcd1" font-size="44">WWE</text><text x="110" y="135" fill="#f5f1e8" font-size="18">RAW</text></g><g fill="#f5f1e8" font-size="17"><text x="110" y="250">TICKET BUYER</text><text x="360" y="250">TICKET BUYER</text><text x="610" y="250">TICKET BUYER</text><text x="110" y="300">ARENA</text><text x="360" y="300">ARENA</text><text x="610" y="300">ARENA</text></g><g stroke="#f5f1e8" stroke-opacity=".4"><path d="M110 190v38M360 190v38M610 190v38M110 260v22M360 260v22M610 260v22"/></g></g><path d="M785 205 860 345 785 485" fill="none" stroke="#fc5042" stroke-width="14"/><g transform="translate(875 160)"><rect width="420" height="330" rx="14" fill="#151a18" stroke="#fc5042" stroke-width="4"/><text x="210" y="115" text-anchor="middle" fill="#f5f1e8" font-size="82" font-weight="900">TKO</text><text x="210" y="185" text-anchor="middle" fill="#fc5042" font-size="54" font-weight="900">TAKEOVER</text><rect x="52" y="215" width="316" height="50" fill="#fc5042"/><text x="210" y="248" text-anchor="middle" fill="#fff" font-size="18" font-weight="900">MULTI-EVENT CITY PACKAGE</text><text x="210" y="300" text-anchor="middle" fill="#42fcd1" font-size="17" font-weight="800">ONE WEEKEND. MULTIPLE EXPERIENCES.</text></g><g transform="translate(1330 165)" fill="#f5f1e8" font-size="17" font-weight="800"><text y="30">FANS</text><text y="75">SPONSORS</text><text y="120">HOTELS</text><text y="165">RESTAURANTS</text><text y="210">TOURISM</text><text y="255">VENUES</text><text y="300">BROADCASTERS</text></g><g stroke="#42fcd1" stroke-width="3"><path d="M1295 225h25M1295 270h25M1295 315h25M1295 360h25M1295 405h25M1295 450h25"/></g><g transform="translate(60 610)"><text x="0" y="0" fill="#fc9142" font-size="18" font-weight="900" letter-spacing="4">EXAMPLE FIVE-DAY FORMAT</text><g transform="translate(0 40)" text-anchor="middle" font-weight="800"><g><rect width="280" height="180" rx="8" fill="#151a18" stroke="#5f7d76"/><text x="140" y="42" fill="#f5f1e8" font-size="17">THURSDAY</text><text x="140" y="95" fill="#42fcd1" font-size="27">ARRIVAL</text><text x="140" y="135" fill="#f5f1e8" opacity=".65" font-size="16">HOTELS · DINING</text></g><g transform="translate(300)"><rect width="280" height="180" rx="8" fill="#34271e" stroke="#7d6c5f"/><text x="140" y="42" fill="#f5f1e8" font-size="17">FRIDAY</text><text x="140" y="95" fill="#fc9142" font-size="30">PBR</text><text x="140" y="135" fill="#f5f1e8" opacity=".65" font-size="16">WESTERN SPORTS</text></g><g transform="translate(600)"><rect width="280" height="180" rx="8" fill="#15181b" stroke="#5f7d76"/><text x="140" y="42" fill="#f5f1e8" font-size="17">SATURDAY</text><text x="140" y="95" fill="#fc5042" font-size="30">UFC</text><text x="140" y="135" fill="#f5f1e8" opacity=".65" font-size="16">FIGHT NIGHT</text></g><g transform="translate(900)"><rect width="280" height="180" rx="8" fill="#20161d" stroke="#5f7d76"/><text x="140" y="42" fill="#f5f1e8" font-size="17">SUNDAY</text><text x="140" y="95" fill="#42fcd1" font-size="30">WWE</text><text x="140" y="135" fill="#f5f1e8" opacity=".65" font-size="16">RAW / PLE</text></g><g transform="translate(1200)"><rect width="280" height="180" rx="8" fill="#151a18" stroke="#5f7d76"/><text x="140" y="42" fill="#f5f1e8" font-size="17">MONDAY</text><text x="140" y="95" fill="#42fcd1" font-size="27">DEPARTURE</text><text x="140" y="135" fill="#f5f1e8" opacity=".65" font-size="16">EXTENDED SPEND</text></g></g></g></g></svg>