<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 850" role="img" aria-labelledby="t d"><title id="t">Shared infrastructure, distinct products</title><desc id="d">PBR, UFC, and WWE remain distinct while sharing rights, sponsorship, ticketing, hospitality, venues, tourism, and distribution.</desc><rect width="1500" height="850" fill="#0b0e0d"/><g font-family="Arial, sans-serif"><text x="75" y="80" fill="#fc9142" font-size="18" font-weight="800" letter-spacing="4">THE PHILOSOPHY OF INTEGRATION</text><text x="75" y="135" fill="#f5f1e8" font-size="48" font-weight="900">CONSISTENCY IN THE INFRASTRUCTURE.</text><text x="75" y="187" fill="#42fcd1" font-size="48" font-weight="900">DIFFERENCE IN THE PRODUCT.</text><g transform="translate(75 250)"><g><rect width="400" height="260" rx="12" fill="#37281c"/><path d="M0 180C100 135 210 205 400 120V260H0Z" fill="#7d6c5f"/><text x="36" y="72" fill="#fc9142" font-size="26" font-weight="900">PBR</text><text x="36" y="108" fill="#f5f1e8" font-size="20">DIRT · CHUTES · WESTERN IDENTITY</text></g><g transform="translate(475)"><rect width="400" height="260" rx="12" fill="#11171a"/><path d="M130 45h140l72 80-72 80H130l-72-80Z" fill="none" stroke="#fc5042" stroke-width="8"/><text x="36" y="72" fill="#fc5042" font-size="26" font-weight="900">UFC</text><text x="36" y="232" fill="#f5f1e8" font-size="20">OCTAGON · FIGHT NIGHT · SPORT</text></g><g transform="translate(950)"><rect width="400" height="260" rx="12" fill="#171116"/><path d="M40 190C130 70 270 70 360 190" fill="none" stroke="#42fcd1" stroke-width="10"/><path d="M95 210h210" stroke="#f5f1e8" stroke-width="6"/><text x="36" y="72" fill="#42fcd1" font-size="26" font-weight="900">WWE</text><text x="36" y="232" fill="#f5f1e8" font-size="20">ENTRANCES · RING · SPECTACLE</text></g></g><g stroke="#42fcd1" stroke-width="4" opacity=".65"><path d="M275 510v90M750 510v90M1225 510v90"/></g><g transform="translate(75 600)"><rect width="1350" height="170" rx="12" fill="#151c1a" stroke="#5f7d76"/><text x="675" y="44" text-anchor="middle" fill="#42fcd1" font-size="20" font-weight="900" letter-spacing="4">SHARED FOUNDATION</text><g fill="#f5f1e8" font-size="19" font-weight="800" text-anchor="middle"><text x="110" y="106">RIGHTS</text><text x="300" y="106">SPONSORSHIP</text><text x="490" y="106">TICKETING</text><text x="675" y="106">HOSPITALITY</text><text x="865" y="106">VENUES</text><text x="1060" y="106">TOURISM</text><text x="1240" y="106">DISTRIBUTION</text></g><path d="M200 70v70M395 70v70M585 70v70M770 70v70M960 70v70M1150 70v70" stroke="#5f7d76"/></g></g></svg>