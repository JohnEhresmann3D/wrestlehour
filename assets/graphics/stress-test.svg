<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="t d"><title id="t">The PBR stress test</title><desc id="d">An eight-point industrial inspection checklist for testing the TKO system around PBR.</desc><rect width="1400" height="1000" fill="#0c0f0e"/><g font-family="Arial, sans-serif"><text x="60" y="65" fill="#fc5042" font-size="18" font-weight="800" letter-spacing="4">QUALITY ASSURANCE / SYSTEM TEST</text><text x="60" y="125" fill="#f5f1e8" font-size="56" font-weight="900">THE PBR STRESS TEST</text><text x="60" y="165" fill="#f5f1e8" opacity=".62" font-size="20">The product under test is not PBR. It is the system around it.</text><g font-size="19" font-weight="700"><g transform="translate(60 210)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#42fcd1"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">01</text><text x="95" y="44" fill="#f5f1e8">CAPABILITY INJECTION</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 298)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#42fcd1"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">02</text><text x="95" y="44" fill="#f5f1e8">CAPABILITY UTILIZATION</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 386)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#fc9142"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">03</text><text x="95" y="44" fill="#f5f1e8">TWO-WAY NETWORK EFFECTS</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 474)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#fc9142"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">04</text><text x="95" y="44" fill="#f5f1e8">GROWTH ACCELERATION</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 562)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#fc5042"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">05</text><text x="95" y="44" fill="#f5f1e8">EMERGENT BEHAVIOR</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 650)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#42fcd1"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">06</text><text x="95" y="44" fill="#f5f1e8">IDENTITY PRESERVATION</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 738)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#7d6c5f"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">07</text><text x="95" y="44" fill="#f5f1e8">CUSTOMER-CONFIDENCE PRESERVATION</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g><g transform="translate(60 826)"><rect width="1280" height="72" rx="6" fill="#141918" stroke="#323a37"/><rect width="66" height="72" rx="6" fill="#5f7d76"/><text x="33" y="47" text-anchor="middle" fill="#111" font-size="28" font-weight="900">08</text><text x="95" y="44" fill="#f5f1e8">SCALABILITY</text><circle cx="1228" cy="36" r="19" fill="none" stroke="#f5f1e8" stroke-opacity=".45" stroke-width="3"/></g></g><g transform="translate(60 930)"><rect width="1280" height="42" rx="4" fill="#fc5042"/><text x="640" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="900" letter-spacing="3">EVIDENCE-BASED · DATA-INFORMED · SKEPTICAL BY DEFAULT</text></g></g></svg>