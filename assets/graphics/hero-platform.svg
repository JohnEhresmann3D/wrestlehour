  <g font-family="Arial, sans-serif" font-weight="700" letter-spacing="3"><text x="70" y="80" fill="#fc5042" font-size="20">UNDER THE HOOD / 01</text><text x="70" y="125" fill="#f5f1e8" font-size="46" letter-spacing="-1">THE MARKET SEES ASSETS.</text><text x="70" y="172" fill="#42fcd1" font-size="46" letter-spacing="-1">WE SEE AN ECOSYSTEM.</text></g>
