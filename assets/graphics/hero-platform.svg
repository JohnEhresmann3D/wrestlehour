<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">One Platform Infinite Potential</title><desc id="desc">A TKO platform linking content, live events, rights, partnerships, hospitality, and fans.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#10201d"/><stop offset="1" stop-color="#070908"/></linearGradient><radialGradient id="halo"><stop stop-color="#42fcd1" stop-opacity=".35"/><stop offset="1" stop-color="#42fcd1" stop-opacity="0"/></radialGradient><pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#fff" opacity=".06"/></pattern></defs>
  <rect width="1600" height="1000" fill="url(#bg)"/><rect width="1600" height="1000" fill="url(#dots)"/><circle cx="800" cy="500" r="430" fill="url(#halo)"/>
  <g fill="none" stroke="#42fcd1" stroke-opacity=".45" stroke-width="3"><circle cx="800" cy="500" r="330"/><circle cx="800" cy="500" r="225" stroke-dasharray="8 12"/><path d="M800 170V830M470 500h660M567 267l466 466M1033 267 567 733"/></g>
  <g font-family="Arial Black,Arial" text-anchor="middle"><circle cx="800" cy="500" r="142" fill="#0b1210" stroke="#42fcd1" stroke-width="5"/><text x="800" y="490" fill="#f5f1e8" font-size="112" letter-spacing="-7">TKO</text><text x="800" y="545" fill="#42fcd1" font-family="Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="6">ONE PLATFORM</text></g>
  <g font-family="Arial, sans-serif" text-anchor="middle" font-weight="800">
    <g transform="translate(690 80)"><rect width="220" height="100" rx="50" fill="#fc5042"/><text x="110" y="62" fill="#fff" font-size="26">STORYTELLING</text></g>
    <g transform="translate(1115 245)"><rect width="245" height="100" rx="50" fill="#fc9142"/><text x="122" y="62" fill="#171917" font-size="26">LIVE EVENTS</text></g>
    <g transform="translate(1160 610)"><rect width="245" height="100" rx="50" fill="#5f7d76"/><text x="122" y="62" fill="#fff" font-size="26">HOSPITALITY</text></g>
    <g transform="translate(690 820)"><rect width="220" height="100" rx="50" fill="#7d6c5f"/><text x="110" y="62" fill="#fff" font-size="26">FANDOM</text></g>
    <g transform="translate(190 610)"><rect width="245" height="100" rx="50" fill="#42fcd1"/><text x="122" y="62" fill="#151917" font-size="26">PARTNERSHIPS</text></g>
    <g transform="translate(240 245)"><rect width="245" height="100" rx="50" fill="#f5f1e8"/><text x="122" y="62" fill="#151917" font-size="26">MEDIA RIGHTS</text></g>
