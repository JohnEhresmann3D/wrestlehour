<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 680" role="img" aria-labelledby="t d"><title id="t">The premiumization line</title><desc id="d">A continuum from underdeveloped commercial potential through a healthy premium layer to displacement.</desc><rect width="1400" height="680" fill="#0b0f0e"/><g font-family="Arial, sans-serif"><text x="65" y="80" fill="#fc9142" font-size="18" font-weight="800" letter-spacing="4">OPEN RISK CONDITION</text><text x="65" y="138" fill="#f5f1e8" font-size="50" font-weight="900">PREMIUM IS NOT THE DEFECT.</text><text x="65" y="190" fill="#fc5042" font-size="50" font-weight="900">DISPLACEMENT IS.</text><g transform="translate(105 310)"><defs><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#5f7d76"/><stop offset=".5" stop-color="#42fcd1"/><stop offset="1" stop-color="#fc5042"/></linearGradient></defs><rect width="1190" height="46" rx="23" fill="url(#line)"/><path d="M630-36v118" stroke="#f5f1e8" stroke-width="5"/><circle cx="630" cy="23" r="17" fill="#0b0f0e" stroke="#f5f1e8" stroke-width="5"/><rect x="505" y="-110" width="250" height="60" rx="8" fill="#f5f1e8"/><text x="630" y="-72" text-anchor="middle" fill="#111" font-size="18" font-weight="900">PBR / CURRENT EVIDENCE ?</text><text x="0" y="110" fill="#f5f1e8" font-size="18" font-weight="900">UNDERDEVELOPED POTENTIAL</text><text x="480" y="110" fill="#42fcd1" font-size="18" font-weight="900">HEALTHY PREMIUM LAYER</text><text x="920" y="110" fill="#fc5042" font-size="18" font-weight="900">CORE PRODUCT DISPLACED</text></g><g fill="#f5f1e8" opacity=".72" font-size="17" font-weight="700"><text x="105" y="540">ACCESS</text><text x="285" y="540">AFFORDABILITY</text><text x="520" y="540">LOCAL AUDIENCE</text><text x="770" y="540">HOSPITALITY SHARE</text><text x="1030" y="540">AUTHENTICITY</text><text x="1210" y="540">TRUST</text></g></g></svg>