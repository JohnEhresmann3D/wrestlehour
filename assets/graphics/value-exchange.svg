<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 850" role="img" aria-labelledby="t d"><title id="t">PBR value exchange</title><desc id="d">Value flows into PBR and outward from PBR to the wider TKO system.</desc><rect width="1500" height="850" fill="#0b0e0d"/><g font-family="Arial, sans-serif"><text x="750" y="80" text-anchor="middle" fill="#f5f1e8" font-size="44" font-weight="900">PBR IS NOT JUST A RECEIVER.</text><text x="750" y="130" text-anchor="middle" fill="#fc5042" font-size="44" font-weight="900">PBR MAKES THE MACHINE MORE USEFUL.</text><g transform="translate(585 265)"><circle cx="165" cy="165" r="155" fill="#151a18" stroke="#fc9142" stroke-width="8"/><text x="165" y="155" text-anchor="middle" fill="#fc9142" font-size="80" font-weight="900">PBR</text><text x="165" y="205" text-anchor="middle" fill="#f5f1e8" font-size="20" font-weight="800" letter-spacing="4">VALUE EXCHANGE</text></g><g fill="none" stroke-width="6"><path d="M470 310H585M470 420H585M470 530H585M915 310h115M915 420h115M915 530h115" stroke="#42fcd1"/><path d="m565 294 20 16-20 16M565 404l20 16-20 16M565 514l20 16-20 16" stroke="#42fcd1"/><path d="m1010 294 20 16-20 16M1010 404l20 16-20 16M1010 514l20 16-20 16" stroke="#fc5042"/></g><g font-size="20" font-weight="800"><text x="95" y="240" fill="#42fcd1" font-size="18" letter-spacing="4">VALUE INTO PBR</text><g fill="#f5f1e8"><text x="95" y="320">MEDIA-RIGHTS EXPERTISE</text><text x="95" y="430">SPONSOR ACCESS</text><text x="95" y="540">HOSPITALITY &amp; CITY RELATIONSHIPS</text></g><text x="1070" y="240" fill="#fc5042" font-size="18" letter-spacing="4">VALUE OUT FROM PBR</text><g fill="#f5f1e8"><text x="1070" y="320">WESTERN &amp; RURAL AUDIENCE</text><text x="1070" y="430">ADDITIONAL EVENT INVENTORY</text><text x="1070" y="540">NEW SPONSOR CATEGORIES</text></g></g><g transform="translate(180 700)"><rect width="1140" height="75" rx="8" fill="#151a18" stroke="#5f7d76"/><text x="570" y="48" text-anchor="middle" fill="#42fcd1" font-size="23" font-weight="900">VALUE FLOWS BOTH WAYS. THAT IS THE NETWORK EFFECT.</text></g></g></svg>