<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650" role="img" aria-labelledby="title desc">
  <title id="title">Commercial Integration Versus Audience Integration</title><desc id="desc">Commercial integration is advanced while audience integration is still developing.</desc>
  <rect width="1400" height="650" fill="#0c100f"/>
  <text x="60" y="70" fill="#42FCD1" font-family="Arial,sans-serif" font-size="18" font-weight="900" letter-spacing="5">TEST FIVE / PRODUCT HEALTH</text>
  <text x="60" y="132" fill="#f7f4ec" font-family="Arial Black,Arial,sans-serif" font-size="49">THE BUSINESS LAYER IS AHEAD OF THE FAN LAYER.</text>
  <g transform="translate(65 210)" font-family="Arial,sans-serif"><text x="0" y="0" fill="#f7f4ec" font-size="25" font-weight="900">COMMERCIAL INTEGRATION</text><text x="1260" y="0" text-anchor="end" fill="#42FCD1" font-size="18" font-weight="900">ADVANCED</text><rect y="35" width="1260" height="42" rx="21" fill="#1c2421"/><rect y="35" width="1080" height="42" rx="21" fill="#42FCD1"/><g fill="#f7f4ec" font-size="18" font-weight="700"><text x="0" y="118">Rights</text><text x="230" y="118">Sponsorship</text><text x="490" y="118">Hospitality</text><text x="740" y="118">City packages</text><text x="1025" y="118">Distribution</text></g><text x="0" y="220" fill="#f7f4ec" font-size="25" font-weight="900">AUDIENCE INTEGRATION</text><text x="1260" y="220" text-anchor="end" fill="#FC9142" font-size="18" font-weight="900">STILL DEVELOPING</text><rect y="255" width="1260" height="42" rx="21" fill="#1c2421"/><rect y="255" width="590" height="42" rx="21" fill="#FC9142"/><g fill="#f7f4ec" font-size="18" font-weight="700"><text x="0" y="338">Star recognition</text><text x="250" y="338">Social growth</text><text x="480" y="338">Cross-property discovery</text><text x="790" y="338">Team attachment</text><text x="1055" y="338">Cultural relevance</text></g></g>
</svg>
